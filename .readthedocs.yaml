version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    post_checkout:
      - git fetch --unshallow || true
    build:
      html:
        - python -m mkdocs build -f mkdocs.yml --clean --site-dir $READTHEDOCS_OUTPUT/html

python:
  install:
    - requirements: docs/requirements.txt
